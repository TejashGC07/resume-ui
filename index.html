<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

h2 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 80px;
    margin-bottom: 10px;
    padding: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    font-size: 16px;
}

#result {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<h2>AI Resume Analyzer</h2>

<textarea id="resume" placeholder="Enter your resume"></textarea>

<textarea id="job" placeholder="Enter job description"></textarea>

<button onclick="analyzeResume()">Analyze</button>

<div id="result"></div>

<script>
async function analyzeResume() {
    const resume = document.getElementById("resume").value;
    const job = document.getElementById("job").value;

    document.getElementById("result").innerText = "Analyzing...";

    try {
        const response = await fetch("https://ai-resume-analyzers-and-job-fit.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `resume=${encodeURIComponent(resume)}&job=${encodeURIComponent(job)}`
        });

        const data = await response.json();

        document.getElementById("result").innerHTML =
            "<h3>Result</h3>" +
            "<b>Score:</b> " + data.score + "<br><br>" +
            "<b>Skills Found:</b><br>" + data.skills.join(", ") + "<br><br>" +
            "<b>Missing Skills:</b><br>" + data.missing.join(", ");

    } catch (error) {
        document.getElementById("result").innerText =
            "Server not responding. Wait 30 seconds and try again.";
    }
}
</script>

</body>
</html>
