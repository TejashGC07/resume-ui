<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 80px;
    margin: 8px 0;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input {
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    background: #fafafa;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Resume Analyzer</h2>

<input type="file" id="file" accept=".txt,.pdf">

<textarea id="resume" placeholder="Or paste resume"></textarea>

<textarea id="job" placeholder="Enter job description"></textarea>

<button onclick="analyzeResume()">Analyze</button>

<div id="result" class="result"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
async function extractTextFromPDF(file) {
    const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(" ");
    }
    return text;
}

async function analyzeResume() {
    let resume = document.getElementById("resume").value.trim();
    let job = document.getElementById("job").value.trim();
    const file = document.getElementById("file").files[0];

    if (!job) {
        alert("Enter job description");
        return;
    }

    document.getElementById("result").innerText = "Analyzing...";

    try {
        if (file) {
            if (file.type === "application/pdf") {
                resume = await extractTextFromPDF(file);
            } else {
                resume = await file.text();
            }
        }

        if (!resume) {
            alert("Upload or paste resume");
            return;
        }

        const res = await fetch("https://ai-resume-analyzers-and-job-fit.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `resume=${encodeURIComponent(resume)}&job=${encodeURIComponent(job)}`
        });

        const data = await res.json();

        let color = "red";
        if (data.score > 70) color = "green";
        else if (data.score > 40) color = "orange";

        document.getElementById("result").innerHTML =
            "<h3 style='color:" + color + "'>Score: " + data.score + "%</h3>" +
            "<p><b>Skills Found:</b> " + data.skills.join(", ") + "</p>" +
            "<p><b>Missing Skills:</b> " + data.missing.join(", ") + "</p>" +
            "<p><b>Suggestions:</b><br>" + data.tips.join("<br>") + "</p>";

    } catch (e) {
        document.getElementById("result").innerText = "Server error. Try again.";
    }
}
</script>

</body>
</html>
