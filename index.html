<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
</head>

<body>

<h2>AI Resume Analyzer</h2>

<textarea id="resume" placeholder="Enter resume" rows="4" cols="30"></textarea><br><br>

<textarea id="job" placeholder="Enter job description" rows="4" cols="30"></textarea><br><br>

<button onclick="analyzeResume()">Analyze</button>

<h3 id="result"></h3>

<script>
async function analyzeResume() {
    const resume = document.getElementById("resume").value;
    const job = document.getElementById("job").value;

    const response = await fetch("https://ai-resume-analyzers-and-job-fit.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `resume=${encodeURIComponent(resume)}&job=${encodeURIComponent(job)}`
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Score: " + data.score + "\n" +
        "Skills: " + data.skills + "\n" +
        "Missing: " + data.missing;
}
</script>

</body>
</html>
